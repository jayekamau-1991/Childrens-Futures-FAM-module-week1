<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Restoring Men - Week 1</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      background: #213A5C; 
      display: flex; 
      flex-direction: column;
      align-items: center; 
      justify-content: center; 
      min-height: 100vh; 
      font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
      padding: 20px;
    }
    
    /* Top Header Styling using your theme colors */
    .header-container {
      text-align: center;
      margin-bottom: 30px;
      max-width: 900px;
      width: 100%;
    }
    .header-container h1 {
      font-family: Georgia, serif;
      font-size: 3.5rem;
      color: #F3ECE0;
      margin-bottom: 10px;
    }
    .header-container .subtitle {
      font-family: monospace;
      font-size: 1.5rem;
      letter-spacing: 6px;
      color: #C9A24A;
      text-transform: uppercase;
    }

    /* Responsive Video Layout Container */
    .video-container {
      position: relative;
      width: 100%;
      max-width: 900px;
      aspect-ratio: 16 / 9;
      background: #000;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
      border: 2px solid #C9A24A; /* Gold accent border */
    }
    .video-container iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }
  </style>
</head>
<body>

  <div class="header-container">
    <h1>Restoring Men</h1>
    <div class="subtitle">Week 1</div>
  </div>

  <div class="video-container">
    <iframe 
      src="https://www.youtube.com/embed/5SMxQ18ojs4?rel=0&modestbranding=1" 
      title="Habit 1: Be Proactive" 
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
      allowfullscreen>
    </iframe>
  </div>

</body>
</html>
